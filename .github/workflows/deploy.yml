name: Deploy static site to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .ssh folder
        run: mkdir -p ~/.ssh

      - name: Write private key
        run: |
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Check key file exists
        run: |
          ls -l ~/.ssh
          test -s ~/.ssh/id_rsa

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: /home/${{ secrets.EC2_USER }}/temp

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /usr/site
            sudo cp -r /home/${{ secrets.EC2_USER }}/temp/* /usr/site/
            sudo rm -rf /home/${{ secrets.EC2_USER }}/temp
            sudo nginx -t
            sudo systemctl reload nginx
